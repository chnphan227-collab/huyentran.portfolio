<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phan Lý Huyền Trân | Sourcing & Data Analyst Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        .glass { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
        }

        .tab-active { 
            color: #4f46e5; 
            border-bottom: 3px solid #4f46e5;
            font-weight: 700;
        }

        .project-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .skill-tag {
            background: #f1f5f9;
            color: #475569;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <header class="sticky top-0 z-50 glass border-b border-slate-200 shadow-sm">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-tighter text-indigo-600 uppercase">Huyen Tran.Portfolio</h1>
            <nav class="flex space-x-8 text-sm font-medium text-slate-500">
                <button onclick="renderAbout()" id="btn-about" class="tab-btn pb-1 transition-all">Profile</button>
                <button onclick="renderProjects()" id="btn-projects" class="tab-btn pb-1 transition-all">Projects</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div id="content-area" class="max-w-4xl mx-auto">
            </div>
    </main>

    <footer class="py-12 text-center text-slate-400 text-xs">
        <p>&copy; 2026 Phan Lý Huyền Trân | SData Analyst</p>
    </footer>

    <script>
        const myData = {
            name: "PHAN LÝ HUYỀN TRÂN",
            role: "Sourcing & Data Analyst Intern",
            contact: {
                phone: "(+84)932019313",
                email: "trnphan42@gmail.com",
                linkedin: "https://www.linkedin.com/in/phan-lý-huyền-trân-408288227/",
                location: "Ho Chi Minh City, Viet Nam"
            },
            summary: "Fresh Hospitality Management graduate with a deep-rooted passion for the service industry and a specialized focus on Data-Driven Decision Making. Throughout my academic journey, I discovered a strong affinity for uncovering hidden insights and crafting compelling Data Storytelling to support strategic decisions in service-oriented sectors. To bridge this industry knowledge with technical expertise, I have nailed some technical tools to transform complex datasets into intuitive visual solutions. Driven by the goal of becoming a Data Analyst within the F&B and booking platform niche, I am eager to apply my analytical mindset to optimize operational efficiency and improve business performance through actionable data insights..",
            education: {
                school: "Ton Duc Thang University",
                degree: "Bachelor in Hospitality Management",
                time: "Nov 2025",
                courses: ["Big Data", "Statistics", "E-commerce", "F&B Management"]
            },
            skills: [
                "Excel (V/XLOOKUP, Pivot Table)", "Data Cleaning & Validation", 
                "Web Scraping", "Power BI (DAX, Power Query)", 
                "Dashboard Reporting", "HTML/CSS reporting", "English (IELTS 6.5)"
            ],
            projects: [
                {
                    title: "Airbnb Market Analysis Dashboard",
                    link: "airbnb.html",
                    time: "March 2026",
                    desc: "Cleaning large datasets, integrating Data Models in Power BI, and utilizing DAX for custom measures to support market entry decisions.",
                    image: "https://lh3.googleusercontent.com/d/1u8rqZ2g1Qd20cDSJha0jsqx5qSYCvI6h",
                    tag: "Power BI"
                },
                {
                    title: "Facebook Performance Analysis",
                    time: "Dec 2025",
                    desc: "Analyzing engagement metrics via Excel Pivot Tables and Storytelling techniques to optimize social media content pillars.",
                    image: "https://lh3.googleusercontent.com/d/1BejwFY3nh0EU4zbAnKz6fdBkdBAz7GLJ",
                    tag: "Excel / Data Storytelling"
                },
                {
                    title: "PepsiCo Market Data Visualization",
                    time: "Nov 2025",
                    desc: "Created standardized Excel templates using Slicers and Pivot Tables for multi-dimensional business analysis.",
                    image: "https://lh3.googleusercontent.com/d/11bw_3KAnilBShBE36Uwd6PKvepA5xqlb",
                    tag: "Excel Dashboard"
                }
            ]
        };

        const contentArea = document.getElementById('content-area');

        function updateTabUI(activeId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById(activeId).classList.add('tab-active');
        }

        function renderAbout() {
            updateTabUI('btn-about');
            
            const skillsHtml = myData.skills.map(skill => `<span class="skill-tag">${skill}</span>`).join('');
            const coursesHtml = myData.education.courses.map(c => `<span class="text-xs bg-indigo-50 text-indigo-500 px-2 py-1 rounded font-medium">${c}</span>`).join(' ');

            contentArea.innerHTML = `
                <div class="animate-in space-y-12">
                    <div class="flex flex-col md:flex-row items-center gap-10">
                        <div class="relative">
                            <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-blue-500 rounded-3xl blur opacity-20"></div>
                            <img src="https://lh3.googleusercontent.com/d/1SJNSR46OwKCEiZAsomG--3ukqqKs8eow" 
                                 class="relative rounded-3xl shadow-xl w-48 h-48 md:w-56 md:h-56 object-cover border-4 border-white">
                        </div>
                        <div class="flex-1 text-center md:text-left">
                            <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight">${myData.name}</h2>
                            <p class="text-indigo-600 font-bold text-lg mt-1">${myData.role}</p>
                            <div class="mt-4 text-slate-500 text-sm space-y-1">
                                <p>📍 ${myData.contact.location}</p>
                                <p>📧 ${myData.contact.email} | 📞 ${myData.contact.phone}</p>
                            </div>
                            <div class="mt-6 flex justify-center md:justify-start gap-4">
                                <a href="${myData.contact.linkedin}" target="_blank" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-indigo-700 transition">LinkedIn</a>
                                <a href="mailto:${myData.contact.email}" class="border border-slate-200 px-5 py-2 rounded-xl text-sm font-bold hover:bg-slate-100 transition">Contact</a>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div class="md:col-span-2 space-y-6">
                            <h3 class="text-xl font-bold border-b-2 border-indigo-100 pb-2">Summary</h3>
                            <p class="text-slate-600 leading-relaxed">${myData.summary}</p>
                            
                            <h3 class="text-xl font-bold border-b-2 border-indigo-100 pb-2 pt-4">Education</h3>
                            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                <p class="font-bold text-slate-800">${myData.education.school}</p>
                                <p class="text-sm text-indigo-600">${myData.education.degree} | ${myData.education.time}</p>
                                <div class="mt-3 flex flex-wrap gap-2">${coursesHtml}</div>
                            </div>
                        </div>
                        <div class="space-y-6">
                            <h3 class="text-xl font-bold border-b-2 border-indigo-100 pb-2">Technical Skills</h3>
                            <div class="flex flex-wrap gap-2">
                                ${skillsHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderProjects() {
            updateTabUI('btn-projects');

            const projectsHtml = myData.projects.map(p => `
                <div class="project-card bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200 flex flex-col">
                    <div class="h-40 overflow-hidden relative">
                        <img src="${p.image}" class="w-full h-full object-cover shadow-inner" alt="${p.title}">
                        <span class="absolute top-3 right-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold text-indigo-600 shadow-sm">${p.tag}</span>
                    </div>
                    <div class="p-6 flex-1 flex flex-col">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${p.time}</p>
                        <h3 class="text-lg font-bold mt-1 text-slate-800">${p.title}</h3>
                        <p class="text-slate-500 text-sm mt-3 leading-relaxed flex-1">${p.desc}</p>
                        <div class="mt-6 pt-4 border-t border-slate-50">
                            <a href="${p.link}" class="text-xs font-bold text-indigo-600 flex items-center gap-1 group">
                            VIEW CASE STUDY <span class="group-hover:translate-x-1 transition-transform">→</span>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');

            contentArea.innerHTML = `
                <div class="animate-in">
                    <div class="mb-10">
                        <h2 class="text-3xl font-extrabold text-slate-900">Featured Projects</h2>
                        <p class="text-slate-500 mt-2">Data analysis & visualization case studies.</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        ${projectsHtml}
                    </div>
                </div>
            `;
        }

        window.onload = renderAbout;
    </script>
</body>
</html>
